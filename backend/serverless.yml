service: smarthealth-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30

  environment:
    DYNAMODB_TABLE: ${self:service}-consultations-${self:provider.stage}
    S3_BUCKET: ${self:service}-ml-models-${self:provider.stage}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:UpdateItem
          Resource:
            - !GetAtt ConsultationsTable.Arn

        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource:
            - !GetAtt MLModelsBucket.Arn
            - !Join ['/', [!GetAtt MLModelsBucket.Arn, '*']]

# 🔥 IMPORTANT: reduce package size
package:
  individually: true
  patterns:
    - '!node_modules/**'
    - '!venv/**'
    - '!__pycache__/**'
    - '!ml_models/**'
    - '!*.csv'
    - '!datasets/**'
    - '!*.ipynb'
    - '!tests/**'

functions:
  analyzeSymptoms:
    handler: lambda_symptom_analyzer.lambda_handler
    events:
      - http:
          path: /analyze
          method: post
          cors: true

  getConsultations:
    handler: lambda_get_consultations.lambda_handler
    events:
      - http:
          path: /consultations/{userId}
          method: get
          cors: true

  getSymptoms:
    handler: lambda_get_symptoms.lambda_handler
    events:
      - http:
          path: /symptoms
          method: get
          cors: true

resources:
  Resources:
    ConsultationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_TABLE}
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: consultationId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: consultationId
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

    MLModelsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.S3_BUCKET}

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false
    slim: true
    strip: true
    layer: false